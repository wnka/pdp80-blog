{{ partial "head.html" . }}

<body>
  {{ partial "nav.html" . }}
  <div id="wrapper" class="home">
    {{ range (where .Site.RegularPages "Type" "posts").GroupByDate "2006" }}
    <div class="archive">
      {{ if ne .Key (now.Format "2006") }}<h1>{{ .Key }}</h1>{{ end }}
      {{ range .Pages }}
      <p>
        <span class="archive-date">{{ .Date.Format "Jan 2" }}</span>
        <span class="archive-content">
          <a href="{{ .RelPermalink }}">{{ .Title }}</a>
        </span>
      </p>
      {{ end }}
    </div>
    {{ end }}
    {{ partial "footer.html" . }}
  </div>
</body>

</html>
